<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Ryaba Kiosk</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
    }
    .card {
      width: min(720px, 92vw);
      padding: 36px;
      border-radius: 28px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.16);
    }
    h1 { margin: 0 0 12px; font-size: 34px; }
    p { color: #cbd5e1; line-height: 1.6; }
  </style>
</head>
<body>
  <section class="card">
    <h1>Ryaba Kiosk</h1>
    <p>Домашний сайт не настроен или не входит в список разрешенных адресов. Откройте панель администратора: нажмите 5 раз в левый верхний угол.</p>
  </section>
</body>
</html>
