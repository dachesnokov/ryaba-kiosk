<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Ryaba Kiosk · Панель администратора</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .shell { padding: 24px; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .eyebrow {
      color: #64748b;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 { margin: 4px 0 0; font-size: 28px; }
    h2 { margin: 0 0 14px; font-size: 18px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .08);
    }
    .wide { grid-column: span 2; }
    .hidden { display: none; }
    .row { display: flex; gap: 10px; }
    input, button {
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      padding: 10px 12px;
      font-size: 14px;
    }
    input { width: 100%; }
    button {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
      cursor: pointer;
      font-weight: 700;
    }
    .actions { display: flex; gap: 10px; }
    dl {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px 12px;
      margin: 0;
    }
    dt { color: #64748b; }
    dd { margin: 0; font-weight: 700; word-break: break-word; }
    pre {
      margin: 12px 0 0;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: #334155;
      max-height: 220px;
      overflow: auto;
    }
    .error { color: #dc2626; }
    .wifi-row {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }
    video {
      width: 100%;
      max-height: 260px;
      background: #020617;
      border-radius: 18px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="header">
      <div>
        <div class="eyebrow">Ryaba Kiosk</div>
        <h1>Панель администратора</h1>
      </div>
      <div class="actions">
        <button id="goHome">На главную</button>
        <button id="reload">Обновить</button>
      </div>
    </section>

    <section id="loginCard" class="card">
      <h2>Введите PIN</h2>
      <div class="row">
        <input id="pin" type="password" placeholder="PIN администратора" autofocus />
        <button id="login">Открыть</button>
      </div>
      <p id="loginError" class="error"></p>
    </section>

    <section id="content" class="grid hidden">
      <div class="card">
        <h2>Состояние</h2>
        <dl id="statusList"></dl>
      </div>

      <div class="card">
        <h2>Сеть</h2>
        <button id="scanWifi">Сканировать Wi-Fi</button>
        <pre id="networkStatus"></pre>
        <div id="wifiList"></div>
      </div>

      <div class="card">
        <h2>Подключение к Wi-Fi</h2>
        <input id="wifiSsid" placeholder="SSID" />
        <input id="wifiPassword" type="password" placeholder="Пароль" />
        <button id="connectWifi">Подключить</button>
        <pre id="wifiResult"></pre>
      </div>

      <div class="card">
        <h2>Звук</h2>
        <input id="volume" type="range" min="0" max="100" value="50" />
        <button id="setVolume">Применить громкость</button>
        <pre id="audioStatus"></pre>
      </div>

      <div class="card wide">
        <h2>Камера и микрофон</h2>
        <button id="testMedia">Проверить камеру/микрофон</button>
        <video id="preview" autoplay playsinline muted></video>
        <pre id="mediaResult"></pre>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function renderJson(value) {
      return JSON.stringify(value, null, 2);
    }

    async function refreshStatus() {
      try {
        if (!window.ryabaKiosk) {
          $("loginError").textContent = "preload API не загружен: window.ryabaKiosk отсутствует";
          return;
        }

        const status = await window.ryabaKiosk.getStatus();

        if (status.unlocked) {
          $("loginCard").classList.add("hidden");
          $("content").classList.remove("hidden");
        }

        const rows = [
          ["Версия", status.version || "—"],
          ["Время", new Date().toLocaleString()],
          ["Текущий URL", status.url || "—"],
          ["Ryaba Core", status.config?.coreUrl || "—"],
          ["Домашний сайт", status.config?.homeUrl || "—"],
          ["Камера", status.config?.allowCamera ? "разрешена" : "запрещена"],
          ["Микрофон", status.config?.allowMicrophone ? "разрешен" : "запрещен"]
        ];

        $("statusList").innerHTML = rows.map(([k, v]) => `<dt>${k}</dt><dd>${String(v)}</dd>`).join("");
        $("networkStatus").textContent = renderJson(status.network);
        $("audioStatus").textContent = renderJson(status.audio);
      } catch (error) {
        $("loginError").textContent = error.message || String(error);
      }
    }

    $("login").onclick = async () => {
      try {
        const result = await window.ryabaKiosk.adminLogin($("pin").value);
        if (!result.ok) {
          $("loginError").textContent = "Неверный PIN";
          return;
        }
        $("loginError").textContent = "";
        await refreshStatus();
      } catch (error) {
        $("loginError").textContent = error.message || String(error);
      }
    };

    $("reload").onclick = () => window.ryabaKiosk.reloadKiosk();
    $("goHome").onclick = () => window.ryabaKiosk.goHome();

    $("scanWifi").onclick = async () => {
      const result = await window.ryabaKiosk.helper("wifi.scan", {});
      if (!result.ok) {
        $("wifiList").innerHTML = `<div class="error">${result.error}</div>`;
        return;
      }
      const rows = result.data || [];
      $("wifiList").innerHTML = rows.map((row) => `
        <div class="wifi-row">
          <strong>${row.ssid || "(скрытая сеть)"}</strong>
          <span>${row.signal || ""}% · ${row.security || "open"}</span>
        </div>
      `).join("");
    };

    $("connectWifi").onclick = async () => {
      const result = await window.ryabaKiosk.helper("wifi.connect", {
        ssid: $("wifiSsid").value,
        password: $("wifiPassword").value
      });
      $("wifiResult").textContent = renderJson(result);
      await refreshStatus();
    };

    $("setVolume").onclick = async () => {
      const result = await window.ryabaKiosk.helper("audio.setVolume", {
        volume: Number($("volume").value)
      });
      $("audioStatus").textContent = renderJson(result);
    };

    $("testMedia").onclick = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        $("preview").srcObject = stream;
        $("mediaResult").textContent = "Камера и микрофон доступны.";
      } catch (error) {
        $("mediaResult").textContent = error.message || String(error);
      }
    };

    refreshStatus();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
